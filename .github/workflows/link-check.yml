name: Broken link check

on:
  schedule:
    - cron: "13 14 * * 1"  # Mondays 14:13 UTC (~7:13am Pacific daylight)
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "**.Rmd"
      - "**.md"
      - "**.html"
      - "_site.yml"
      - ".github/lychee.toml"
      - ".github/workflows/link-check.yml"

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: link-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  links:
    name: Check links in source + rendered site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Try to download latest built site artifact (optional)
        id: artifact
        uses: dawidd6/action-download-artifact@v21
        continue-on-error: true
        with:
          workflow: pages-branch-previews.yml
          name: site
          path: _site
          branch: main
          if_no_artifact_found: warn

      - name: Pick lychee target
        id: target
        run: |
          set -e
          if [ -d _site ] && [ -n "$(ls -A _site 2>/dev/null || true)" ]; then
            echo "target=_site" >> "$GITHUB_OUTPUT"
            echo "Using rendered _site/"
          else
            echo "target=." >> "$GITHUB_OUTPUT"
            echo "No rendered site available; scanning source files"
          fi

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config .github/lychee.toml
            --no-progress
            ${{ steps.target.outputs.target == '_site' && format('--root-dir {0}/_site _site/**/*.html', github.workspace) || '*.Rmd README.md' }}
          format: markdown
          output: ./lychee-report.md
          fail: false

      - name: Upload report
        uses: actions/upload-artifact@v7
        if: ${{ hashFiles('lychee-report.md') != '' }}
        with:
          name: lychee-report
          path: lychee-report.md

      - name: Find existing open broken-links issue
        id: find_issue
        if: ${{ steps.lychee.outputs.exit_code != '0' && github.event_name != 'pull_request' && hashFiles('lychee-report.md') != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing=$(gh issue list \
            --state open \
            --label broken-links --label automated \
            --json number,title \
            --jq '.[] | select(.title=="Broken links detected") | .number' \
            | head -1)
          echo "number=${existing}" >> "$GITHUB_OUTPUT"
          if [ -n "$existing" ]; then
            echo "Updating existing issue #${existing}"
          else
            echo "No open issue found; will open a new one"
          fi

      - name: Open or update issue on broken links
        if: ${{ steps.lychee.outputs.exit_code != '0' && github.event_name != 'pull_request' && hashFiles('lychee-report.md') != '' }}
        uses: peter-evans/create-issue-from-file@v6
        with:
          issue-number: ${{ steps.find_issue.outputs.number }}
          title: "Broken links detected"
          content-filepath: ./lychee-report.md
          labels: |
            broken-links
            automated

      - name: Comment on PR
        if: ${{ github.event_name == 'pull_request' && hashFiles('lychee-report.md') != '' }}
        uses: thollander/actions-comment-pull-request@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file-path: ./lychee-report.md
          comment-tag: lychee-link-check
          mode: upsert
          create-if-not-exists: true
