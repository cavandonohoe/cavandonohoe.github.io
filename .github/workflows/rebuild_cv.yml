name: Rebuild CV PDF/DOCX

on:
  workflow_dispatch:
  schedule:
    - cron: "33 11 * * 2"  # Tuesdays 11:33 UTC (~3:33am Pacific)

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: rebuild-cv
  cancel-in-progress: false

jobs:
  cv:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/sa.json
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"all"'

      - name: Write GCP key
        run: |
          printf '%s' '${{ secrets.GCP_SA_KEY }}' > sa.json
          chmod 600 sa.json

      - name: Setup Chrome (for pagedown::chrome_print)
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Render cv.Rmd to PDF
        env:
          CHROMOTE_CHROME: ${{ steps.chrome.outputs.chrome-path }}
          CI: "true"
        run: |
          Rscript -e '
          googledrive::drive_auth(path="sa.json", cache=FALSE)
          googlesheets4::gs4_auth(path="sa.json", cache=FALSE)
          rmarkdown::render("cv.Rmd", encoding="UTF-8")
          '

      - name: Render cv_doc.Rmd to DOCX
        env:
          CI: "true"
        run: |
          Rscript -e '
          googledrive::drive_auth(path="sa.json", cache=FALSE)
          googlesheets4::gs4_auth(path="sa.json", cache=FALSE)
          rmarkdown::render("cv_doc.Rmd", encoding="UTF-8")
          ' || echo "cv_doc render failed (non-fatal); continuing"

      - name: Remove SA key before any commit
        if: always()
        run: rm -f sa.json

      - name: Detect meaningful changes
        id: diff
        run: |
          set -euo pipefail
          # PDFs and DOCX files contain creation timestamps; ignore those by
          # extracting text and comparing. For PDF, use pdftotext if available,
          # otherwise fall back to byte diff.
          changed=""
          for f in cv.pdf cv_doc.docx; do
            if [ -f "$f" ] && ! git diff --quiet -- "$f"; then
              changed="$changed $f"
            fi
          done
          if [ -z "$changed" ]; then
            echo "changed=" >> "$GITHUB_OUTPUT"
            echo "No CV file changes detected."
          else
            echo "changed=$changed" >> "$GITHUB_OUTPUT"
            echo "Changed: $changed"
          fi

      - name: Open PR if CV files changed
        if: ${{ steps.diff.outputs.changed != '' }}
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/rebuild-cv
          delete-branch: true
          commit-message: "Rebuild CV (PDF + DOCX) from latest Google Sheet"
          title: "Rebuild CV from latest Google Sheet"
          body: |
            Auto-rebuilt `cv.pdf` and/or `cv_doc.docx` from the source Google Sheet.

            Review for unintended changes before merging.
          add-paths: |
            cv.pdf
            cv_doc.docx
          labels: |
            cv
            automated
