name: R lint (lintr)

on:
  pull_request:
    branches: [main]
    paths:
      - "**.R"
      - "**.Rmd"
      - ".lintr"
      - ".github/workflows/lint.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lintr:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Ensure base ref is available
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.ref || 'main' }}"

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          r-version-file: .R-version

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake git libcurl4-openssl-dev libfontconfig1-dev libfreetype6-dev \
            libfribidi-dev libgit2-dev libharfbuzz-dev libicu-dev libjpeg-dev \
            libnode-dev libpng-dev libssl-dev libtiff-dev libuv1-dev libwebp-dev \
            libx11-dev libxml2-dev make pandoc zlib1g-dev

      - uses: r-lib/actions/setup-renv@v2

      - name: Run lintr on changed files
        run: |
          Rscript - <<'RSCRIPT'
          base_sha <- Sys.getenv("GITHUB_BASE_SHA", unset = "")
          if (!nzchar(base_sha)) {
            base_sha <- tryCatch(
              system2("git", c("merge-base", "origin/main", "HEAD"),
                      stdout = TRUE),
              error = function(e) "HEAD~1"
            )
          }
          changed <- system2(
            "git",
            c("diff", "--name-only", "--diff-filter=ACMR", base_sha, "HEAD"),
            stdout = TRUE
          )
          changed <- changed[grepl("\\.(R|Rmd)$", changed, ignore.case = TRUE)]
          changed <- changed[file.exists(changed)]
          changed <- changed[!grepl("^_archive/", changed)]
          if (length(changed) == 0) {
            cat("No R/Rmd files changed; skipping lintr.\n")
            quit(status = 0)
          }
          cat("Linting", length(changed), "file(s):\n")
          cat(paste0("  - ", changed), sep = "\n")
          results <- lapply(changed, function(f) {
            tryCatch(lintr::lint(f), error = function(e) {
              message("lintr error on ", f, ": ", conditionMessage(e))
              list()
            })
          })
          all_lints <- do.call(c, results)
          n <- length(all_lints)
          cat("\nFound", n, "lint(s).\n")
          if (n > 0) {
            print(all_lints)
            # Don't fail the build for now — surface as a comment via
            # the warnings, but exit 0. Flip to status=1 to enforce.
          }
          RSCRIPT
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
