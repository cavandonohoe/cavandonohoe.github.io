name: Refresh US rental markets data

on:
  workflow_dispatch:
  schedule:
    - cron: "47 14 5 * *"  # 5th of each month, 14:47 UTC — Zillow updates monthly

permissions:
  contents: write

concurrency:
  group: refresh-us-rentals
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          r-version-file: .R-version

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::dplyr
            any::stringr
            any::readr
            any::here
            any::magrittr
            any::scales

      - name: Refresh US rental markets
        run: Rscript scripts/us_rental_markets_data.R

      - name: Verify only expected CSVs changed
        run: |
          set -euo pipefail
          unexpected="$(git diff --name-only HEAD \
            | grep -Ev '^data/us_rental_markets\.csv$' || true)"
          if [ -n "$unexpected" ]; then
            echo "ERROR: refresh modified files outside data/us_rental_markets.csv:"
            echo "$unexpected"
            exit 1
          fi

      - name: Commit and push if changed
        id: push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/us_rental_markets.csv
          if git diff --cached --quiet; then
            echo "No changes."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Auto-update US rental markets data"
          for i in 1 2 3; do
            if git push; then
              echo "pushed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Push failed; rebasing on remote and retrying ($i/3)..."
            git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)"
          done
          echo "ERROR: failed to push rentals update after 3 attempts."
          exit 1

      # Bot pushes via GITHUB_TOKEN don't trigger downstream workflows (a
      # GitHub anti-recursion guard), so the site won't redeploy after this
      # commit unless we explicitly dispatch the build workflow.
      - name: Trigger site redeploy
        if: steps.push.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages-branch-previews.yml --ref main
