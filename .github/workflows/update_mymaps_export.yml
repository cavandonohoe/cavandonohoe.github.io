name: Update My Maps export

on:
  workflow_dispatch:
  schedule:
    - cron: "17 17 * * 1" # Mondays 17:17 UTC (~9:17am Pacific standard time)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download KML
        run: |
          set -euo pipefail
          mkdir -p data
          curl -fL "https://www.google.com/maps/d/kml?mid=${{ secrets.MYMAPS_MID }}&forcekml=1" -o data/saved_places.kml

      - name: Convert KML to CSV
        run: |
          python3 scripts/kml_to_csv.py data/saved_places.kml data/saved_places.csv

      - name: Debug files
        run: |
          ls -lah data || true
          git status --porcelain
          head -n 5 data/saved_places.csv || true

      - name: Commit and push if changed
        id: push
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/saved_places.kml data/saved_places.csv

          if git diff --cached --quiet; then
            echo "No changes."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "Auto-update My Maps export"
          for i in 1 2 3; do
            if git push; then
              echo "pushed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Push failed; rebasing on remote and retrying ($i/3)..."
            git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)"
          done
          echo "ERROR: failed to push My Maps export update after 3 attempts."
          exit 1

      # Bot pushes via GITHUB_TOKEN don't trigger downstream workflows (a
      # GitHub anti-recursion guard), so the site won't redeploy after this
      # commit unless we explicitly dispatch the build workflow.
      - name: Trigger site redeploy
        if: steps.push.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages-branch-previews.yml --ref main
