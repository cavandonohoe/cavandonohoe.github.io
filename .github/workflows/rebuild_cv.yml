name: Rebuild CV PDF/DOCX

on:
  workflow_dispatch:
  schedule:
    - cron: "33 11 * * 2"  # Tuesdays 11:33 UTC (~3:33am Pacific)

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: rebuild-cv
  cancel-in-progress: false

jobs:
  cv:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/sa.json
    steps:
      - uses: actions/checkout@v7

      - name: Stash existing CV files for content comparison
        run: |
          mkdir -p .cv-pre
          [ -f cv.pdf ] && cp cv.pdf .cv-pre/cv.pdf || true
          [ -f cv_doc.docx ] && cp cv_doc.docx .cv-pre/cv_doc.docx || true

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          r-version-file: .R-version

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-renv@v2

      - name: Write GCP key
        run: |
          printf '%s' '${{ secrets.GCP_SA_KEY }}' > sa.json
          chmod 600 sa.json

      - name: Setup Chrome (for pagedown::chrome_print)
        id: chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable

      - name: Render cv.Rmd to PDF
        env:
          CHROMOTE_CHROME: ${{ steps.chrome.outputs.chrome-path }}
          CI: "true"
        run: |
          Rscript -e '
          googledrive::drive_auth(path="sa.json", cache=FALSE)
          googlesheets4::gs4_auth(path="sa.json", cache=FALSE)
          rmarkdown::render("cv.Rmd", encoding="UTF-8")
          '

      - name: Render cv_doc.Rmd to DOCX
        env:
          CI: "true"
        run: |
          Rscript -e '
          googledrive::drive_auth(path="sa.json", cache=FALSE)
          googlesheets4::gs4_auth(path="sa.json", cache=FALSE)
          rmarkdown::render("cv_doc.Rmd", encoding="UTF-8")
          ' || echo "cv_doc render failed (non-fatal); continuing"

      - name: Remove SA key before any commit
        if: always()
        run: rm -f sa.json

      - name: Detect meaningful changes
        id: diff
        run: |
          set -euo pipefail
          # Both PDF and DOCX embed regeneration timestamps that change every
          # render even when the underlying Google Sheet hasn't been edited.
          # Compare extractable content instead of raw bytes:
          #   - DOCX: unzip and compare word/document.xml (the visible body)
          #   - PDF:  use pdftotext to compare extracted text
          # If content is unchanged, restore the prior bytes so the PR step
          # below sees a clean working tree and skips opening a noise PR.

          sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils

          changed=""

          # ---- DOCX content compare ----
          if [ -f cv_doc.docx ]; then
            if [ -f .cv-pre/cv_doc.docx ]; then
              old_xml="$(unzip -p .cv-pre/cv_doc.docx word/document.xml || echo "")"
              new_xml="$(unzip -p cv_doc.docx word/document.xml || echo "")"
              if [ "$old_xml" = "$new_xml" ]; then
                echo "cv_doc.docx: content unchanged (timestamp-only diff); reverting."
                cp .cv-pre/cv_doc.docx cv_doc.docx
              else
                echo "cv_doc.docx: content changed."
                changed="$changed cv_doc.docx"
              fi
            else
              changed="$changed cv_doc.docx"
            fi
          fi

          # ---- PDF content compare ----
          if [ -f cv.pdf ]; then
            if [ -f .cv-pre/cv.pdf ]; then
              old_txt="$(pdftotext -layout .cv-pre/cv.pdf - 2>/dev/null || echo "")"
              new_txt="$(pdftotext -layout cv.pdf - 2>/dev/null || echo "")"
              if [ "$old_txt" = "$new_txt" ]; then
                echo "cv.pdf: text unchanged (likely timestamp-only diff); reverting."
                cp .cv-pre/cv.pdf cv.pdf
              else
                echo "cv.pdf: text changed."
                changed="$changed cv.pdf"
              fi
            else
              changed="$changed cv.pdf"
            fi
          fi

          rm -rf .cv-pre

          if [ -z "$changed" ]; then
            echo "changed=" >> "$GITHUB_OUTPUT"
            echo "No meaningful CV content changes detected."
          else
            echo "changed=$changed" >> "$GITHUB_OUTPUT"
            echo "Meaningful changes:$changed"
          fi

      - name: Open PR if CV files changed
        if: ${{ steps.diff.outputs.changed != '' }}
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/rebuild-cv
          delete-branch: true
          commit-message: "Rebuild CV (PDF + DOCX) from latest Google Sheet"
          title: "Rebuild CV from latest Google Sheet"
          body: |
            Auto-rebuilt `cv.pdf` and/or `cv_doc.docx` from the source Google Sheet.

            Review for unintended changes before merging.
          add-paths: |
            cv.pdf
            cv_doc.docx
          labels: |
            cv
            automated
