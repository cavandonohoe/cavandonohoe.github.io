name: Update IMDb episode ratings

on:
  workflow_dispatch:
  schedule:
    - cron: "23 8 * * 1" # Mondays 08:23 UTC (~1:23am Pacific)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::magrittr
            any::dplyr
            any::tibble
            any::purrr
            any::stringr
            any::readr
            any::here
            any::httr2
            any::jsonlite

      - name: Scrape IMDb episode ratings
        run: Rscript web_scraping/imdb_season_episode_ratings_plot.R

      - name: Debug files
        run: |
          ls -lah data/*_ep_ratings.csv | tail -20
          git status --porcelain

      - name: Commit and push if changed
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/*_ep_ratings.csv

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "Auto-update IMDb episode ratings"
          git push
