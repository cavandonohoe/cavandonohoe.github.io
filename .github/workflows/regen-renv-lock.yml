name: Regenerate renv.lock

# One-off maintenance workflow: rebuild renv.lock against the current Posit
# Package Manager snapshot so every recorded version is available as a binary.
# The old lockfile pinned versions whose P3M `latest` binaries were superseded
# upstream, which broke renv::restore() in CI once the package cache rotated.
#
# Run via the Actions tab (workflow_dispatch). It installs the project's
# dependencies fresh, snapshots them, and commits the refreshed lockfile back
# to the branch it was dispatched on. Delete this workflow once the lockfile
# is healthy again.

on:
  workflow_dispatch:
  push:
    branches:
      - cdonohoe/fix-ci-renv-restore

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          use-r-version-file: true

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake git libcurl4-openssl-dev libfontconfig1-dev libfreetype6-dev \
            libfribidi-dev libgit2-dev libharfbuzz-dev libicu-dev libjpeg-dev \
            libnode-dev libpng-dev libssl-dev libtiff-dev libuv1-dev libwebp-dev \
            libx11-dev libxml2-dev make pandoc zlib1g-dev

      - name: Rebuild lockfile from current P3M
        run: |
          Rscript -e '
            if (!requireNamespace("renv", quietly = TRUE)) install.packages("renv")
            renv::activate()
            # Install everything the project needs at current, mutually
            # compatible versions from the public P3M binary repo, then snapshot.
            renv::install()
            renv::snapshot(prompt = FALSE)
            # Prove the fresh library is internally consistent.
            st <- renv::status()
            if (!isTRUE(st$synchronized)) {
              stop("renv still out of sync after snapshot")
            }
          '

      - name: Commit refreshed renv.lock
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- renv.lock; then
            echo "renv.lock unchanged."
            exit 0
          fi
          git add renv.lock
          git commit -m "Regenerate renv.lock against current P3M"
          git push origin HEAD:${{ github.ref_name }}
