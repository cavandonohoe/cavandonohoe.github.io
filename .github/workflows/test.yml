name: R tests

on:
  push:
    branches: [main]
    paths:
      - ".githooks/pre-push"
      - "scripts/**/*.R"
      - "tests/**/*.R"
      - "tests/**/*.sh"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main]
    paths:
      - ".githooks/pre-push"
      - "scripts/**/*.R"
      - "tests/**/*.R"
      - "tests/**/*.sh"
      - ".github/workflows/test.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testthat:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          r-version-file: .R-version

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake git libcurl4-openssl-dev libfontconfig1-dev libfreetype6-dev \
            libfribidi-dev libgit2-dev libharfbuzz-dev libicu-dev libjpeg-dev \
            libnode-dev libpng-dev libssl-dev libtiff-dev libuv1-dev libwebp-dev \
            libx11-dev libxml2-dev make pandoc zlib1g-dev

      - uses: r-lib/actions/setup-renv@v2

      - name: Run pre-push hook smoke test
        run: ./tests/test_pre_push_hook.sh

      - name: Run testthat
        run: |
          Rscript -e '
            failed <- FALSE
            if (dir.exists("tests/testthat")) {
              results <- testthat::test_dir("tests/testthat", reporter = "summary")
              df <- as.data.frame(results)
              failed <- failed || any(df$failed > 0) || any(df$error)
            }
            flat_tests <- list.files("tests", pattern = "^test.*\\.R$", full.names = TRUE)
            for (f in flat_tests) {
              sys.source(f, envir = new.env(parent = globalenv()))
            }
            if (failed) {
              quit(status = 1)
            }
          '
