name: Refresh Top 250 movies with Rotten Tomatoes

on:
  workflow_dispatch:
  schedule:
    - cron: "53 13 12 * *"  # 12th of each month, 13:53 UTC

permissions:
  contents: write

concurrency:
  group: refresh-top250-rt
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          r-version: '4.6'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake git libcurl4-openssl-dev libfontconfig1-dev libfreetype6-dev \
            libfribidi-dev libgdal-dev libgeos-dev libgit2-dev libharfbuzz-dev \
            libicu-dev libjpeg-dev libmagick++-dev libnode-dev libpng-dev \
            libpoppler-cpp-dev libproj-dev librsvg2-dev libssl-dev libtiff-dev \
            libudunits2-dev libuv1-dev libwebp-dev libx11-dev libxml2-dev make \
            pandoc zlib1g-dev

      - uses: r-lib/actions/setup-renv@v2

      - name: Refresh Top 250 with Rotten Tomatoes
        run: Rscript scripts/refresh_top250_with_rt.R

      - name: Verify only the expected CSV changed
        run: |
          set -euo pipefail
          unexpected="$(git diff --name-only HEAD \
            | grep -Ev '^data/top250_movies_with_rt\.csv$' || true)"
          if [ -n "$unexpected" ]; then
            echo "ERROR: refresh modified unexpected files:"
            echo "$unexpected"
            exit 1
          fi

      - name: Commit and push if changed
        id: push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/top250_movies_with_rt.csv
          if git diff --cached --quiet; then
            echo "No changes."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Auto-update Top 250 movies with Rotten Tomatoes"
          for i in 1 2 3; do
            if git push; then
              echo "pushed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Push failed; rebasing on remote and retrying ($i/3)..."
            git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)"
          done
          echo "ERROR: failed to push Top 250 update after 3 attempts."
          exit 1

      # Bot pushes via GITHUB_TOKEN don't trigger downstream workflows (a
      # GitHub anti-recursion guard), so the site won't redeploy after this
      # commit unless we explicitly dispatch the build workflow.
      - name: Trigger site redeploy
        if: steps.push.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages-branch-previews.yml --ref main
