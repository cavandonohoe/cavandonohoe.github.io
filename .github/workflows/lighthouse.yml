name: Lighthouse CI

on:
  # Audit every PR against its deployed preview URL.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  # Audit production after each successful main build, using the build artifact.
  workflow_run:
    workflows: ["Build site + deploy prod & PR previews (branch-based Pages)"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  actions: read

concurrency:
  group: lighthouse-${{ github.event.pull_request.number || github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Mode 1: pull_request -> audit deployed preview URL.
  # Skips Dependabot PRs (no preview gets deployed for them).
  # ---------------------------------------------------------------------------
  lighthouse-preview:
    name: Lighthouse (PR preview)
    if: ${{ github.event_name == 'pull_request' && github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "20"

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Wait for PR preview to be live
        id: wait
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -uo pipefail
          base="https://cavandonohoe.github.io/pr-${PR_NUMBER}"
          url="${base}/index.html"
          echo "Waiting for ${url}..."
          # The preview is published by a separate workflow (build ~3m, then a
          # gh-pages push, then GitHub Pages rebuild/propagation). That whole
          # chain can take well over 10 minutes on a fresh PR, so poll patiently
          # (up to ~14 min). Lighthouse audits are advisory (all assertions are
          # "warn"), so if the preview simply isn't live yet we skip the audit
          # instead of failing the check and turning the PR red.
          for i in $(seq 1 84); do
            code="$(curl -s -o /dev/null -w '%{http_code}' "$url" || true)"
            if [ "$code" = "200" ]; then
              echo "Preview is live."
              echo "live=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt ${i}/84: HTTP ${code}; sleeping 10s..."
            sleep 10
          done
          echo "Preview never became live within the wait window; skipping audit."
          echo "live=false" >> "$GITHUB_OUTPUT"

      - name: Run Lighthouse CI against preview
        id: lhci
        if: ${{ steps.wait.outputs.live == 'true' }}
        env:
          LHCI_BASE_URL: https://cavandonohoe.github.io/pr-${{ github.event.pull_request.number }}
        run: |
          set +e
          lhci autorun --config=.github/lighthouserc.cjs > lhci.log 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          tail -200 lhci.log
          set -e

      - name: Build PR comment
        if: ${{ steps.wait.outputs.live == 'true' }}
        run: |
          {
            echo "## Lighthouse CI (PR preview)"
            echo ""
            echo "Audited: \`https://cavandonohoe.github.io/pr-${{ github.event.pull_request.number }}/\`"
            echo ""
            echo "\`\`\`"
            grep -E "(http|Performance|Accessibility|Best Practices|SEO|Report:)" lhci.log | head -100 || true
            echo "\`\`\`"
          } > lhci-comment.md

      - name: Comment on PR
        if: ${{ steps.wait.outputs.live == 'true' }}
        uses: thollander/actions-comment-pull-request@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ github.event.pull_request.number }}
          file-path: ./lhci-comment.md
          comment-tag: lighthouse-ci
          mode: upsert
          create-if-not-exists: true

      - name: Note skipped audit
        if: ${{ steps.wait.outputs.live != 'true' }}
        run: |
          echo "::notice::PR preview was not live within the wait window; \
          Lighthouse audit skipped (advisory check, not failing the PR)."

      - name: Upload Lighthouse logs
        if: ${{ always() && steps.wait.outputs.live == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-logs-pr-${{ github.event.pull_request.number }}
          path: |
            lhci.log
            .lighthouseci/**
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Mode 2: workflow_run after a successful main build -> audit local artifact.
  # Also handles workflow_dispatch (uses latest successful main build).
  # ---------------------------------------------------------------------------
  lighthouse-artifact:
    name: Lighthouse (build artifact)
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Download site artifact from triggering workflow
        uses: dawidd6/action-download-artifact@v21
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ github.event.workflow_run.id }}
          name: site
          path: _site
          if_no_artifact_found: warn
          workflow: pages-branch-previews.yml
          branch: main

      - name: Bail if no site artifact
        id: presence
        run: |
          if [ -d _site ] && [ -n "$(ls -A _site 2>/dev/null || true)" ]; then
            echo "have_site=true" >> "$GITHUB_OUTPUT"
          else
            echo "No _site artifact available; skipping Lighthouse."
            echo "have_site=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v7
        if: steps.presence.outputs.have_site == 'true'
        with:
          node-version: "20"

      - name: Install Lighthouse CI + http-server
        if: steps.presence.outputs.have_site == 'true'
        run: npm install -g @lhci/cli@0.14.x http-server

      - name: Serve _site
        if: steps.presence.outputs.have_site == 'true'
        run: |
          http-server _site -p 4567 --silent &
          echo $! > server.pid
          sleep 2

      - name: Run Lighthouse CI against artifact
        if: steps.presence.outputs.have_site == 'true'
        id: lhci
        env:
          LHCI_BASE_URL: http://localhost:4567
        run: |
          set +e
          lhci autorun --config=.github/lighthouserc.cjs > lhci.log 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          tail -200 lhci.log
          set -e

      - name: Stop server
        if: always()
        run: kill "$(cat server.pid)" 2>/dev/null || true

      - name: Upload Lighthouse logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-logs-${{ github.run_id }}
          path: |
            lhci.log
            .lighthouseci/**
          if-no-files-found: ignore
