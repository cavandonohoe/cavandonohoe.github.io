name: Update IMDb episode ratings

on:
  workflow_dispatch:
  schedule:
    - cron: "23 8 * * 1" # Mondays 08:23 UTC (~1:23am Pacific)

permissions:
  contents: write
  actions: write

# Don't pile up overlapping runs; if a previous run is still going, queue this
# one and run it after.
concurrency:
  group: update-imdb-ratings
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          r-version: '4.6'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake git libcurl4-openssl-dev libfontconfig1-dev libfreetype6-dev \
            libfribidi-dev libgdal-dev libgeos-dev libgit2-dev libharfbuzz-dev \
            libicu-dev libjpeg-dev libmagick++-dev libnode-dev libpng-dev \
            libpoppler-cpp-dev libproj-dev librsvg2-dev libssl-dev libtiff-dev \
            libudunits2-dev libuv1-dev libwebp-dev libx11-dev libxml2-dev make \
            pandoc zlib1g-dev

      - uses: r-lib/actions/setup-renv@v2

      # Run the scraper. Per-show errors are swallowed by the script's safety
      # wrapper; if any show fails the script exits non-zero and we stop here.
      # The no-shrink guard is enforced by the script itself (no env var set).
      - name: Scrape IMDb episode ratings
        run: Rscript web_scraping/imdb_season_episode_ratings_plot.R

      # Sanity check: the only files the scraper is allowed to touch are
      # data/*_ep_ratings.csv. If anything else changed, the workflow aborts
      # before commit so a runaway script can't push unrelated mutations.
      # We only inspect modifications/additions to *tracked* files (not
      # untracked artifacts from the R setup actions like .cache/, lock
      # files, etc.).
      - name: Verify only ratings CSVs changed
        run: |
          set -euo pipefail
          unexpected="$(git diff --name-only HEAD \
            | grep -Ev '^data/[a-z0-9_]+_ep_ratings\.csv$' || true)"
          if [ -n "$unexpected" ]; then
            echo "ERROR: scraper modified tracked files outside data/*_ep_ratings.csv:"
            echo "$unexpected"
            exit 1
          fi
          echo "OK: only ratings CSVs changed."

      - name: Debug files
        run: |
          ls -lah data/*_ep_ratings.csv | tail -20
          git status --porcelain

      - name: Commit and push if changed
        id: push
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/*_ep_ratings.csv

          if git diff --cached --quiet; then
            echo "No changes."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Final safety check: the staged diff must only contain ratings
          # CSVs. Belt-and-suspenders next to the earlier verify step.
          staged_other="$(git diff --cached --name-only \
            | grep -Ev '^data/[a-z0-9_]+_ep_ratings\.csv$' || true)"
          if [ -n "$staged_other" ]; then
            echo "ERROR: refusing to commit unexpected staged files:"
            echo "$staged_other"
            exit 1
          fi

          changed_count="$(git diff --cached --name-only | wc -l | tr -d ' ')"
          echo "Committing $changed_count updated CSV(s)."

          # Build a per-show summary of substantive changes:
          #   - new rows (episodes that didn't exist before)
          #   - rating changes (existing season/episode whose rating value changed)
          # Vote-count-only changes (every row gets new votes every week) are
          # ignored so the body highlights what actually moved.
          summary_file="$(mktemp)"
          total_new=0
          total_rating=0
          for f in $(git diff --cached --name-only); do
            show="$(basename "$f" _ep_ratings.csv)"

            old="$(mktemp)"; new="$(mktemp)"
            git show "HEAD:$f" > "$old" 2>/dev/null || : > "$old"
            cp "$f" "$new"

            # new rows = lines in new whose season,episode key isn't in old
            new_rows="$(awk -F, 'NR==FNR{if(FNR>1)k[$1","$2]=1;next} FNR>1 && !($1","$2 in k)' \
              "$old" "$new" | wc -l | tr -d ' ')"

            # rating changes = same season,episode key, different rating value
            rating_changes="$(awk -F, '
              NR==FNR{if(FNR>1)r[$1","$2]=$4;next}
              FNR>1 && ($1","$2 in r) && r[$1","$2]!=$4
            ' "$old" "$new" | wc -l | tr -d ' ')"

            rm -f "$old" "$new"

            if [ "$new_rows" -gt 0 ] || [ "$rating_changes" -gt 0 ]; then
              printf -- '- %s: +%s new, %s rating change(s)\n' \
                "$show" "$new_rows" "$rating_changes" >> "$summary_file"
            else
              printf -- '- %s: vote counts only\n' "$show" >> "$summary_file"
            fi
            total_new=$((total_new + new_rows))
            total_rating=$((total_rating + rating_changes))
          done

          subject="Auto-update IMDb episode ratings (${changed_count} show(s), +${total_new} ep, ${total_rating} rating change(s))"
          {
            echo "$subject"
            echo
            cat "$summary_file"
          } > "$summary_file.msg"

          git commit -F "$summary_file.msg"
          rm -f "$summary_file" "$summary_file.msg"
          for i in 1 2 3; do
            if git push; then
              echo "pushed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Push failed; rebasing on remote and retrying ($i/3)..."
            git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)"
          done
          echo "ERROR: failed to push IMDb ratings update after 3 attempts."
          exit 1

      # Bot pushes via GITHUB_TOKEN don't trigger downstream workflows (a
      # GitHub anti-recursion guard), so the site won't redeploy after this
      # commit unless we explicitly dispatch the build workflow.
      - name: Trigger site redeploy
        if: steps.push.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages-branch-previews.yml --ref main
