name: PR Rmd smoke test

on:
  pull_request:
    branches: [main]
    paths:
      - "**.Rmd"
      - "_common.R"
      - "_site.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Render only changed Rmds
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/sa.json
      CI: "true"
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Compute changed Rmds
        id: changed
        run: |
          set -euo pipefail
          base_sha="${{ github.event.pull_request.base.sha }}"
          if [ -z "$base_sha" ]; then
            base_sha="$(git merge-base origin/main HEAD)"
          fi
          # Only render top-level Rmds that exist in the working tree.
          changed=$(git diff --name-only --diff-filter=ACMR "$base_sha" HEAD \
            | grep -E '^[^/]+\.Rmd$' || true)
          # Skip CV files: they need Chrome + GCP; they're covered by the
          # rebuild_cv workflow.
          changed=$(echo "$changed" | grep -Ev '^(cv|cv_doc|README)\.Rmd$' || true)
          # Skip Rmds known to need Chrome / heavy assets.
          changed=$(echo "$changed" | grep -Ev '^(my_travels|imdb_top_250_tv_series)\.Rmd$' || true)
          {
            echo "files<<EOF"
            echo "$changed"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          if [ -z "$changed" ]; then
            echo "No top-level Rmds changed; nothing to smoke-test."
          else
            echo "Will smoke-test:"
            echo "$changed"
          fi

      - uses: r-lib/actions/setup-r@v2
        if: ${{ steps.changed.outputs.files != '' }}
        with:
          use-public-rspm: true
          r-version-file: .R-version

      - uses: r-lib/actions/setup-pandoc@v2
        if: ${{ steps.changed.outputs.files != '' }}

      - uses: r-lib/actions/setup-r-dependencies@v2
        if: ${{ steps.changed.outputs.files != '' }}
        with:
          dependencies: '"all"'

      - name: Write GCP key (same-repo PRs only)
        if: |
          steps.changed.outputs.files != '' &&
          github.event.pull_request.head.repo.full_name == github.repository
        run: |
          printf '%s' '${{ secrets.GCP_SA_KEY }}' > sa.json
          chmod 600 sa.json

      - name: Render each changed Rmd
        if: ${{ steps.changed.outputs.files != '' }}
        run: |
          set -euo pipefail
          mkdir -p _smoke
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "::group::Rendering $f"
            Rscript -e "
              if (file.exists('sa.json')) {
                googledrive::drive_auth(path='sa.json', cache=FALSE)
                googlesheets4::gs4_auth(path='sa.json', cache=FALSE)
              } else {
                try(googlesheets4::gs4_deauth(), silent = TRUE)
              }
              rmarkdown::render('$f', output_dir = '_smoke', encoding = 'UTF-8',
                                output_options = list(self_contained = FALSE,
                                                      lib_dir = '_smoke/site_libs'),
                                envir = new.env(parent = globalenv()))
            "
            echo "::endgroup::"
          done <<< "${{ steps.changed.outputs.files }}"

      - name: Cleanup secrets
        if: always()
        run: rm -f sa.json
