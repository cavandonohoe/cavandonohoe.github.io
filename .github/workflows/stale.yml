name: Mark stale issues and PRs

on:
  schedule:
    - cron: "31 9 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "pinned,security,keep"
          exempt-pr-labels: "pinned,security,keep"
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 14 days if no further activity occurs.
            Add the `keep` label to prevent this.
          stale-pr-message: >
            This PR has been automatically marked as stale because it has not had
            recent activity. It will be closed in 14 days if no further activity occurs.
            Add the `keep` label to prevent this.
          close-issue-message: >
            Closing this issue due to inactivity. Reopen if it's still relevant.
          close-pr-message: >
            Closing this PR due to inactivity. Reopen if you'd like to continue working on it.
          operations-per-run: 100
