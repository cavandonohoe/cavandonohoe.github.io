name: R tests

on:
  push:
    branches: [main]
    paths:
      - "scripts/**/*.R"
      - "tests/**/*.R"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main]
    paths:
      - "scripts/**/*.R"
      - "tests/**/*.R"
      - ".github/workflows/test.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testthat:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          r-version-file: .R-version

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake git libcurl4-openssl-dev libfontconfig1-dev libfreetype6-dev \
            libfribidi-dev libgit2-dev libharfbuzz-dev libicu-dev libjpeg-dev \
            libnode-dev libpng-dev libssl-dev libtiff-dev libuv1-dev libwebp-dev \
            libx11-dev libxml2-dev make pandoc zlib1g-dev

      - uses: r-lib/actions/setup-renv@v2

      - name: Run testthat
        run: |
          Rscript -e '
            results <- testthat::test_dir("tests/testthat", reporter = "summary")
            df <- as.data.frame(results)
            if (any(df$failed > 0) || any(df$error)) {
              quit(status = 1)
            }
          '
