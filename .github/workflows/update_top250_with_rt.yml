name: Refresh Top 250 movies with Rotten Tomatoes

on:
  workflow_dispatch:
  schedule:
    - cron: "53 13 12 * *"  # 12th of each month, 13:53 UTC

permissions:
  contents: write

concurrency:
  group: refresh-top250-rt
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::dplyr
            any::tibble
            any::stringr
            any::readr
            any::here
            any::magrittr
            any::rvest
            any::xml2
            any::httr
            any::httr2
            any::jsonlite
            any::lubridate
            any::polite

      - name: Refresh Top 250 with Rotten Tomatoes
        run: Rscript scripts/refresh_top250_with_rt.R

      - name: Verify only the expected CSV changed
        run: |
          set -euo pipefail
          unexpected="$(git diff --name-only HEAD \
            | grep -Ev '^data/top250_movies_with_rt\.csv$' || true)"
          if [ -n "$unexpected" ]; then
            echo "ERROR: refresh modified unexpected files:"
            echo "$unexpected"
            exit 1
          fi

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/top250_movies_with_rt.csv
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "Auto-update Top 250 movies with Rotten Tomatoes"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            echo "Push failed; rebasing on remote and retrying ($i/3)..."
            git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)"
          done
          echo "ERROR: failed to push Top 250 update after 3 attempts."
          exit 1
