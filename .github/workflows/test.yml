name: R tests

on:
  push:
    branches: [main]
    paths:
      - ".githooks/pre-push"
      - "scripts/**/*.R"
      - "scripts/run_tests.R"
      - "tests/**/*.R"
      - "tests/**/*.sh"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main]
    paths:
      - ".githooks/pre-push"
      - "scripts/**/*.R"
      - "scripts/run_tests.R"
      - "tests/**/*.R"
      - "tests/**/*.sh"
      - ".github/workflows/test.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testthat:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-r-env

      - name: Run pre-push hook smoke test
        run: ./tests/test_pre_push_hook.sh

      - name: Run tests
        run: Rscript scripts/run_tests.R
