<!-- Dark mode + site-wide styling -->
<style>
:root {
  --bg-color: #fff;
  --text-color: #333;
  --card-bg: #f8f9fa;
  --card-border: #dee2e6;
  --card-shadow: rgba(0,0,0,0.08);
  --link-color: #337ab7;
  --code-bg: #f5f5f5;
  --table-stripe: #f9f9f9;
  --accordion-bg: #337ab7;
  --accordion-hover: #286090;
  --muted-text: #777;
  --footer-text: #ccc;
  --well-bg: #f5f5f5;
}

[data-theme="dark"] {
  --bg-color: #1a1a2e;
  --text-color: #e0e0e0;
  --card-bg: #16213e;
  --card-border: #0f3460;
  --card-shadow: rgba(0,0,0,0.3);
  --link-color: #64b5f6;
  --code-bg: #16213e;
  --table-stripe: #16213e;
  --accordion-bg: #0f3460;
  --accordion-hover: #1a4a8a;
  --muted-text: #aaa;
  --footer-text: #999;
  --well-bg: #16213e;
}

body {
  background-color: var(--bg-color) !important;
  color: var(--text-color) !important;
  transition: background-color 0.3s ease, color 0.3s ease;
}

[data-theme="dark"] .container-fluid,
[data-theme="dark"] .container {
  background-color: var(--bg-color);
  color: var(--text-color);
}

[data-theme="dark"] h1, [data-theme="dark"] h2,
[data-theme="dark"] h3, [data-theme="dark"] h4 {
  color: var(--text-color) !important;
}

[data-theme="dark"] a { color: var(--link-color); }
[data-theme="dark"] code { background-color: var(--code-bg); color: #e0e0e0; }
[data-theme="dark"] pre { background-color: var(--code-bg); border-color: var(--card-border); }
[data-theme="dark"] .well { background-color: var(--well-bg); border-color: var(--card-border); }
[data-theme="dark"] .table-striped > tbody > tr:nth-of-type(odd) { background-color: var(--table-stripe); }
[data-theme="dark"] .table { color: var(--text-color); }
[data-theme="dark"] img { opacity: 0.9; }

/* Dark mode toggle button */
.dark-mode-toggle {
  background: none;
  border: none;
  font-size: 20px;
  cursor: pointer;
  padding: 8px 12px;
  margin-top: 8px;
  color: #9d9d9d;
  transition: color 0.2s;
}
.dark-mode-toggle:hover { color: #fff; }


/* Homepage CTA buttons */
.hero-cta {
  display: flex;
  flex-wrap: wrap;
  gap: 0.6em;
  margin: 1em 0 1.2em;
}
.hero-btn {
  display: inline-block;
  background: var(--link-color);
  color: #fff !important;
  border: 1px solid var(--link-color);
  border-radius: 999px;
  padding: 0.45em 0.95em;
  font-size: 0.92em;
  text-decoration: none !important;
  transition: opacity 0.2s ease, transform 0.2s ease;
}
.hero-btn:hover {
  opacity: 0.92;
  transform: translateY(-1px);
  text-decoration: none !important;
}

/* Project filters */
.project-controls {
  margin: 0.5em 0 1em;
}
#project-search {
  width: 100%;
  max-width: 540px;
  padding: 0.6em 0.8em;
  border-radius: 8px;
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  color: var(--text-color);
  margin-bottom: 0.7em;
}
#project-type {
  width: 100%;
  max-width: 240px;
  padding: 0.55em 0.65em;
  border-radius: 8px;
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  color: var(--text-color);
  margin-bottom: 0.7em;
}
.project-filter-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5em;
}
.filter-btn {
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  color: var(--text-color);
  border-radius: 999px;
  font-size: 0.82em;
  padding: 0.35em 0.8em;
  cursor: pointer;
}
.filter-btn.active {
  border-color: var(--link-color);
  background: rgba(51, 122, 183, 0.12);
}
.project-meta {
  margin-top: 0.65em;
  font-size: 0.76em;
  color: var(--muted-text);
  text-transform: capitalize;
}
.project-empty-state {
  color: var(--muted-text);
  font-style: italic;
  margin-top: 0.3em;
}

/* Project cards */
.project-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.2em;
  margin: 1.5em 0;
}
.project-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 10px;
  padding: 1.4em;
  text-decoration: none !important;
  color: var(--text-color) !important;
  transition: transform 0.2s, box-shadow 0.2s;
  display: block;
  box-shadow: 0 2px 8px var(--card-shadow);
}
.project-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 20px var(--card-shadow);
  text-decoration: none !important;
}
.project-card .card-icon { font-size: 2em; margin-bottom: 0.4em; }
.project-card h3 { font-size: 1.05em; margin: 0 0 0.4em 0; color: var(--link-color) !important; }
.project-card p { font-size: 0.88em; color: var(--muted-text); margin: 0; line-height: 1.4; }

/* Timestamp badges */
.data-timestamp {
  display: inline-block;
  background: var(--well-bg);
  border: 1px solid var(--card-border);
  border-radius: 4px;
  padding: 3px 10px;
  font-size: 0.82em;
  color: var(--muted-text);
  margin-bottom: 1em;
}

/* Collapsible table accordion styling */
details.table-accordion {
  margin: 1em 0;
}
details.table-accordion > summary {
  display: block;
  width: 100%;
  padding: 14px 20px;
  font-size: 1.1em;
  font-weight: 600;
  color: #fff;
  background: var(--accordion-bg);
  border: none;
  border-radius: 6px;
  cursor: pointer;
  list-style: none;
  text-align: center;
  transition: background 0.2s ease;
}
details.table-accordion > summary::-webkit-details-marker { display: none; }
details.table-accordion > summary::before {
  content: "\25B6\00a0\00a0";
  font-size: 0.85em;
}
details.table-accordion[open] > summary {
  border-radius: 6px 6px 0 0;
  background: var(--accordion-hover);
}
details.table-accordion[open] > summary::before {
  content: "\25BC\00a0\00a0";
}
details.table-accordion > summary:hover {
  background: var(--accordion-hover);
}
</style>
<script>
(function() {
  var saved = localStorage.getItem('theme') || 'light';
  if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
})();
</script>
