name: Refresh S&P 500 (VOO) data

on:
  workflow_dispatch:
  schedule:
    - cron: "29 13 * * 6"  # Saturdays 13:29 UTC (~6:29am Pacific) — after market close

permissions:
  contents: write
  actions: write

concurrency:
  group: refresh-sp500
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-r-env

      - name: Refresh VOO stock prices
        run: Rscript scripts/sp500_data.R

      - name: Verify only voo CSV changed
        run: |
          set -euo pipefail
          unexpected="$(git diff --name-only HEAD \
            | grep -Ev '^data/voo_stock_prices\.csv$' || true)"
          if [ -n "$unexpected" ]; then
            echo "ERROR: refresh modified files outside data/voo_stock_prices.csv:"
            echo "$unexpected"
            exit 1
          fi

      - name: Commit and push if changed
        id: push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/voo_stock_prices.csv
          if git diff --cached --quiet; then
            echo "No changes."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Auto-update VOO stock prices"
          for i in 1 2 3; do
            if git push; then
              echo "pushed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Push failed; rebasing on remote and retrying ($i/3)..."
            git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)"
          done
          echo "ERROR: failed to push VOO update after 3 attempts."
          exit 1

      # Bot pushes via GITHUB_TOKEN don't trigger downstream workflows (a
      # GitHub anti-recursion guard), so the site won't redeploy after this
      # commit unless we explicitly dispatch the build workflow.
      - name: Trigger site redeploy
        if: steps.push.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages-branch-previews.yml --ref main
